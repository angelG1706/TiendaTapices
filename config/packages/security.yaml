security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Usuario
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            stateless: true
            jwt: ~
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/registro, roles: PUBLIC_ACCESS }
        - { path: ^/api/pagos/webhook, roles: PUBLIC_ACCESS }
        - { path: ^/api/tapices, roles: PUBLIC_ACCESS }
        - { path: ^/api/colecciones, roles: PUBLIC_ACCESS }
        - { path: ^/api/contacto, roles: PUBLIC_ACCESS }
        - { path: ^/api/admin/imagenes-sitio, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/generar-descripcion, roles: ROLE_ADMIN }
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10